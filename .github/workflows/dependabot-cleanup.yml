name: Dependabot Cleanup

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  delete-branch:
    runs-on: ubuntu-latest
    # Only run when a Dependabot PR is actually merged (not just closed)
    if: |
      github.actor == 'dependabot[bot]' &&
      github.event.pull_request.merged == true
    steps:
      - name: Delete merged Dependabot branch
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const ref = context.payload.pull_request.head.ref
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${ref}`
              })
              core.info(`Deleted branch: ${ref}`)
            } catch (e) {
              // 422 = branch already deleted (e.g. repo-level auto-delete enabled)
              if (e.status !== 422) throw e
              core.info(`Branch already gone: ${ref}`)
            }
