name: Deploy Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
      - 'include/beast_json/beast_json.hpp'

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; cancel in-flight if a new push arrives
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Doxygen
        run: sudo apt-get install -y doxygen

      # Build Doxygen FIRST so VitePress can reference it
      - name: Build Doxygen
        run: |
          doxygen Doxyfile
          echo "Doxygen output files:"
          ls -la docs/api/reference/ | head -20

      - name: Install dependencies
        run: |
          cd docs
          npm install

      - name: Build VitePress
        run: |
          cd docs
          npm run docs:build

      # Copy Doxygen HTML into the VitePress dist AFTER build completes
      - name: Copy Doxygen to VitePress dist
        run: |
          mkdir -p docs/.vitepress/dist/api/reference
          cp -r docs/api/reference/. docs/.vitepress/dist/api/reference/
          echo "Files in dist/api/reference:"
          ls docs/.vitepress/dist/api/reference/ | head -10

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
