name: Deploy Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
      - 'include/beast_json/beast_json.hpp'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Doxygen
        run: sudo apt-get install -y doxygen

      # Build Doxygen FIRST so VitePress can reference it
      - name: Build Doxygen
        run: |
          doxygen Doxyfile
          echo "Doxygen output files:"
          ls -la docs/api/reference/ | head -20

      - name: Install dependencies
        run: |
          cd docs
          npm install

      - name: Build VitePress
        run: |
          cd docs
          npm run docs:build

      # Copy Doxygen HTML into the VitePress dist AFTER build completes
      - name: Copy Doxygen to VitePress dist
        run: |
          mkdir -p docs/.vitepress/dist/api/reference
          cp -r docs/api/reference/. docs/.vitepress/dist/api/reference/
          echo "Files in dist/api/reference:"
          ls docs/.vitepress/dist/api/reference/ | head -10

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/.vitepress/dist
          force_orphan: true
