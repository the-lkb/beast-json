name: Deploy Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - '!docs/public/benchmark-results.json'
      - '.github/workflows/docs.yml'
      - 'include/beast_json/beast_json.hpp'
  # Deploy after benchmarks finish so benchmark-results.json is up-to-date.
  # workflow_run fires after the Benchmark workflow commits the updated JSON.
  workflow_run:
    workflows: ["Benchmark"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

# Only one Pages deploy at a time; cancel in-flight if a new push arrives
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # When triggered by workflow_run, github.sha points to the commit that
      # *started* the benchmark — before it committed benchmark-results.json.
      # Check out the branch HEAD instead so we always get the latest data.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: docs/package-lock.json

      - name: Setup Doxygen
        run: sudo apt-get install -y doxygen

      # Build Doxygen FIRST so VitePress can reference it
      - name: Build Doxygen
        run: |
          doxygen Doxyfile
          if [ -d docs/api/reference ]; then
            echo "Doxygen output files:"
            ls -la docs/api/reference/ | head -20
          else
            echo "Warning: docs/api/reference not found after doxygen run"
          fi

      - name: Install dependencies
        run: |
          cd docs
          npm ci

      - name: Build VitePress
        run: |
          cd docs
          npm run docs:build

      # Copy Doxygen HTML into the VitePress dist AFTER build completes
      - name: Copy Doxygen to VitePress dist
        run: |
          if [ -d docs/api/reference ]; then
            mkdir -p docs/.vitepress/dist/api/reference
            cp -r docs/api/reference/. docs/.vitepress/dist/api/reference/
            echo "Files in dist/api/reference:"
            ls docs/.vitepress/dist/api/reference/ | head -10
          else
            echo "Skipping: docs/api/reference does not exist"
          fi

      # Push built site to gh-pages branch — avoids the github-pages
      # environment protection rule that blocks deployments from main.
      - name: Deploy to gh-pages branch
        run: |
          cd docs/.vitepress/dist
          git init -b gh-pages
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "deploy: update documentation [skip ci]"
          git push --force \
            "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" \
            HEAD:gh-pages
