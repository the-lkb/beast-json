name: C++20 CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_test:
    name: ${{ matrix.os }} - ${{ matrix.compiler }} - ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        arch: [x86_64, aarch64]
        build_type: [Release, Debug]
        compiler: [gcc, clang, apple-clang]
        include:
          # Specific compiler versions and CC/CXX exports
          - compiler: gcc
            cc: gcc-13
            cxx: g++-13
          - compiler: clang
            cc: clang-18
            cxx: clang++-18
        exclude:
          # Exclude invalid architecture combinations
          - os: macos-latest
            arch: x86_64 # macos-latest is ARM (M1/M2/M3), exclude x86_64
          # Exclude combinations that don't make sense
          - os: ubuntu-latest
            compiler: apple-clang
          - os: macos-latest
            compiler: gcc
          - os: macos-latest
            compiler: clang

    steps:
    - uses: actions/checkout@v4

    - name: Install Compilers (Ubuntu)
      if: runner.os == 'Linux' && matrix.compiler == 'gcc' && matrix.arch == 'x86_64'
      run: |
        sudo apt-get update
        sudo apt-get install -y g++-13

    - name: Install Compilers (Ubuntu Clang)
      if: runner.os == 'Linux' && matrix.compiler == 'clang' && matrix.arch == 'x86_64'
      run: |
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 18

    - name: Configure CMake (Native)
      if: matrix.arch == 'x86_64' || runner.os != 'Linux'
      env:
        CC: ${{ matrix.cc }}
        CXX: ${{ matrix.cxx }}
      run: >
        cmake -B build
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -DBEAST_JSON_BUILD_TESTS=ON

    - name: Build (Native)
      if: runner.os != 'Linux' || matrix.arch == 'x86_64'
      run: cmake --build build --config ${{ matrix.build_type }} -j4

    - name: Test (Native)
      if: runner.os != 'Linux' || matrix.arch == 'x86_64'
      working-directory: build
      run: ctest -C ${{ matrix.build_type }} --output-on-failure

    - name: Run & Export Benchmarks (Native)
      if: matrix.build_type == 'Release' && (runner.os != 'Linux' || matrix.arch == 'x86_64')
      working-directory: build/benchmarks
      run: |
        ./bench_all --all > benchmark_${{ matrix.os }}_${{ matrix.arch }}_${{ matrix.compiler }}.txt || echo "Benchmark failed or missing"

    - name: Post Benchmark Results to Job Summary (Native)
      if: matrix.build_type == 'Release' && (runner.os != 'Linux' || matrix.arch == 'x86_64')
      run: |
        BENCH_FILE="build/benchmarks/benchmark_${{ matrix.os }}_${{ matrix.arch }}_${{ matrix.compiler }}.txt"
        if [ -f "$BENCH_FILE" ]; then
          {
            echo "## Benchmark Results"
            echo "**Platform:** \`${{ matrix.os }}\` / \`${{ matrix.arch }}\` / \`${{ matrix.compiler }}\` / \`${{ matrix.build_type }}\`"
            echo '```'
            cat "$BENCH_FILE"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Upload Benchmark Artifact (Native)
      if: matrix.build_type == 'Release' && (runner.os != 'Linux' || matrix.arch == 'x86_64')
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-${{ matrix.os }}-${{ matrix.arch }}-${{ matrix.compiler }}
        path: build/benchmarks/benchmark_${{ matrix.os }}_${{ matrix.arch }}_${{ matrix.compiler }}.txt
        if-no-files-found: ignore
        retention-days: 90

    # ── AARCH64 (ARM Linux) QEMU Emulation ────────────────────────────────────

    # Pre-fetch FetchContent dependencies on the host (has internet access).
    # The QEMU container cannot reliably reach github.com, so we download
    # googletest here and pass FETCHCONTENT_SOURCE_DIR_GOOGLETEST to cmake.
    - name: Pre-fetch dependencies for QEMU
      if: runner.os == 'Linux' && matrix.arch == 'aarch64'
      run: |
        mkdir -p "${{ github.workspace }}/.cmake-deps/googletest-src"
        curl -L -o /tmp/gtest.zip \
          https://github.com/google/googletest/archive/refs/tags/v1.14.0.zip
        unzip -q /tmp/gtest.zip -d /tmp/gtest-extracted
        cp -r /tmp/gtest-extracted/googletest-1.14.0/. \
          "${{ github.workspace }}/.cmake-deps/googletest-src/"

    - name: Run aarch64 Build & Test (QEMU)
      if: runner.os == 'Linux' && matrix.arch == 'aarch64'
      uses: uraimo/run-on-arch-action@v2
      with:
        arch: aarch64
        distro: ubuntu22.04
        githubToken: ${{ github.token }}
        install: |
          apt-get update
          apt-get install -y cmake build-essential gcc-12 g++-12 clang-15 git
        run: |
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            export CC=gcc-12
            export CXX=g++-12
          else
            export CC=clang-15
            export CXX=clang++-15
          fi
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DBEAST_JSON_BUILD_TESTS=ON \
            -DBEAST_DISABLE_LTO=ON \
            -DFETCHCONTENT_SOURCE_DIR_GOOGLETEST=${{ github.workspace }}/.cmake-deps/googletest-src
          cmake --build build --config ${{ matrix.build_type }} -j1
          cd build && ctest -C ${{ matrix.build_type }} --output-on-failure
          if [ "${{ matrix.build_type }}" = "Release" ]; then
            cd benchmarks
            ./bench_all --all --quick > benchmark_${{ matrix.os }}_aarch64_${{ matrix.compiler }}.txt || true
          fi

    - name: Post QEMU Benchmark Results to Job Summary
      if: runner.os == 'Linux' && matrix.arch == 'aarch64' && matrix.build_type == 'Release'
      run: |
        BENCH_FILE="build/benchmarks/benchmark_${{ matrix.os }}_aarch64_${{ matrix.compiler }}.txt"
        if [ -f "$BENCH_FILE" ]; then
          {
            echo "## Benchmark Results"
            echo "**Platform:** \`${{ matrix.os }}\` / \`aarch64 (QEMU)\` / \`${{ matrix.compiler }}\` / \`${{ matrix.build_type }}\`"
            echo '```'
            cat "$BENCH_FILE"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Upload Benchmark Artifact (QEMU aarch64)
      if: runner.os == 'Linux' && matrix.arch == 'aarch64' && matrix.build_type == 'Release'
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-${{ matrix.os }}-aarch64-${{ matrix.compiler }}
        path: build/benchmarks/benchmark_${{ matrix.os }}_aarch64_${{ matrix.compiler }}.txt
        if-no-files-found: ignore
        retention-days: 90
