name: C++20 CI

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.github/workflows/docs.yml'
      - '.github/workflows/benchmark.yml'
      - '.github/workflows/release.yml'
      - '.github/workflows/codeql.yml'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.github/workflows/docs.yml'
      - '.github/workflows/benchmark.yml'
      - '.github/workflows/release.yml'
      - '.github/workflows/codeql.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build_and_test:
    name: ${{ matrix.os }} / ${{ matrix.arch }} / ${{ matrix.compiler }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x86_64 ────────────────────────────────────────────────────
          - os: ubuntu-latest
            arch: x86_64
            compiler: gcc
            cc: gcc-13
            cxx: g++-13
            build_type: Release

          - os: ubuntu-latest
            arch: x86_64
            compiler: gcc
            cc: gcc-13
            cxx: g++-13
            build_type: Debug

          - os: ubuntu-latest
            arch: x86_64
            compiler: clang
            cc: clang-18
            cxx: clang++-18
            build_type: Release

          - os: ubuntu-latest
            arch: x86_64
            compiler: clang
            cc: clang-18
            cxx: clang++-18
            build_type: Debug

          # ── Linux aarch64 — GitHub-hosted native ARM64 runner ────────────
          # Native runners eliminate QEMU emulation entirely, removing all
          # emulation-related segfaults caused by incomplete NEON/SVE support,
          # signal-handling differences, and stack-size divergence in QEMU.
          - os: ubuntu-24.04-arm
            arch: aarch64
            compiler: gcc
            cc: gcc-14
            cxx: g++-14
            build_type: Release

          - os: ubuntu-24.04-arm
            arch: aarch64
            compiler: gcc
            cc: gcc-14
            cxx: g++-14
            build_type: Debug

          - os: ubuntu-24.04-arm
            arch: aarch64
            compiler: clang
            cc: clang-18
            cxx: clang++-18
            build_type: Release

          - os: ubuntu-24.04-arm
            arch: aarch64
            compiler: clang
            cc: clang-18
            cxx: clang++-18
            build_type: Debug

          # ── macOS ARM64 (Apple Silicon) ──────────────────────────────────
          - os: macos-latest
            arch: aarch64
            compiler: apple-clang
            cc: clang
            cxx: clang++
            build_type: Release

          - os: macos-latest
            arch: aarch64
            compiler: apple-clang
            cc: clang
            cxx: clang++
            build_type: Debug

    steps:
    - uses: actions/checkout@v6

    # ── Compiler installation ────────────────────────────────────────────────

    - name: Install GCC 13 (Ubuntu x86_64)
      if: runner.os == 'Linux' && matrix.compiler == 'gcc' && matrix.arch == 'x86_64'
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y g++-13

    - name: Install Clang 18 (Ubuntu x86_64)
      if: runner.os == 'Linux' && matrix.compiler == 'clang' && matrix.arch == 'x86_64'
      run: |
        wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s 18

    - name: Install GCC 14 (Ubuntu aarch64)
      if: runner.os == 'Linux' && matrix.compiler == 'gcc' && matrix.arch == 'aarch64'
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y g++-14

    - name: Install Clang 18 (Ubuntu aarch64)
      if: runner.os == 'Linux' && matrix.compiler == 'clang' && matrix.arch == 'aarch64'
      run: |
        wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s 18

    # ── Build cache (ccache) ─────────────────────────────────────────────────

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}
        max-size: 256M

    # ── CMake configure ──────────────────────────────────────────────────────

    - name: Configure CMake
      env:
        CC: ${{ matrix.cc }}
        CXX: ${{ matrix.cxx }}
      run: >
        cmake -B build
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -DQBUEM_JSON_BUILD_TESTS=ON
        -DQBUEM_JSON_BUILD_BENCHMARKS=OFF
        -DCMAKE_C_COMPILER_LAUNCHER=ccache
        -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

    # ── Build ────────────────────────────────────────────────────────────────

    - name: Build
      run: cmake --build build --config ${{ matrix.build_type }} -j2

    # ── Test ─────────────────────────────────────────────────────────────────
    # --rerun-failed retries any test that exits non-zero once before marking
    # it as a failure, guarding against rare transient OS-level flakiness.

    - name: Test
      working-directory: build
      # Run tests; on failure, retry once to filter out transient OS flakiness.
      # Two-invocation retry is portable back to CMake 3.14 (no --rerun-failed-max-attempts needed).
      run: |
        ctest -C ${{ matrix.build_type }} --output-on-failure --timeout 180 \
          || ctest -C ${{ matrix.build_type }} --output-on-failure --timeout 180 --rerun-failed
