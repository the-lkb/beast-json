name: Releaser

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build_wheels]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Download wheels
        uses: actions/download-artifact@v8
        with:
          pattern: cibw-wheels-*
          path: dist
          merge-multiple: true

      - name: Generate Checksums
        run: |
          cd dist
          sha256sum *.whl > SHA256SUMS.txt
          cd ..
          sha256sum include/qbuem_json/qbuem_json.hpp >> dist/SHA256SUMS.txt

      - name: Create or Update GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: "qbuem-json ${{ github.ref_name }}: The Ultimate High-Performance C++20 JSON Parser"
          generate_release_notes: true
          files: |
            include/qbuem_json/qbuem_json.hpp
            dist/*.whl
            dist/SHA256SUMS.txt

  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.0
        with:
          package-dir: bindings/python
        env:
          CIBW_BUILD_FRONTEND: "build"
          # Skip 32-bit builds and musl
          CIBW_SKIP: "*-manylinux_i686 *-musllinux_*"

      - uses: actions/upload-artifact@v7
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl
