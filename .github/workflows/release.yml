name: Releaser

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    name: Create GitHub Release & Upload Header
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Generate Checksums
        run: |
          mkdir -p dist
          sha256sum include/qbuem_json/qbuem_json.hpp > dist/SHA256SUMS.txt

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: "qbuem-json ${{ github.ref_name }}: The Ultimate High-Performance C++20 JSON Parser"
          generate_release_notes: true
          files: |
            include/qbuem_json/qbuem_json.hpp
            dist/SHA256SUMS.txt
