name: Releaser

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build_wheels]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: cibw-wheels-*
          path: dist
          merge-multiple: true

      - name: Create or Update GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: "qbuem-json ${{ github.ref_name }}: The Ultimate High-Performance C++20 JSON Parser"
          generate_release_notes: true
          files: |
            include/qbuem_json/qbuem_json.hpp
            dist/*.whl

  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22.0
        env:
          CIBW_BEFORE_BUILD: pip install nanobind scikit-build-core
          CIBW_BUILD_FRONTEND: "pip"
          CIBW_PROJECT_DIR: "bindings/python"
          # Skip 32-bit builds and musl
          CIBW_SKIP: "*-manylinux_i686 *-musllinux_*"

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl
