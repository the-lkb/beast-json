name: Benchmark

on:
  push:
    branches: [main]
    paths:
      - 'include/**'
      - 'benchmarks/**'
      - '.github/workflows/benchmark.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── Per-platform benchmark ────────────────────────────────────────────────
  benchmark:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            label: "x86_64 · GCC 13 · Ubuntu"
            cc: gcc-13
            cxx: g++-13
            install_cmd: sudo apt-get update -qq && sudo apt-get install -y g++-13

          - os: ubuntu-24.04-arm
            arch: linux-aarch64
            label: "Linux aarch64 · GCC 14 · Ubuntu"
            cc: gcc-14
            cxx: g++-14
            install_cmd: sudo apt-get update -qq && sudo apt-get install -y g++-14

          - os: macos-latest
            arch: apple-aarch64
            label: "Apple Silicon · Apple Clang · macOS"
            cc: clang
            cxx: clang++
            install_cmd: echo "Apple Clang pre-installed"

    steps:
    - uses: actions/checkout@v6

    - name: Install compiler
      run: ${{ matrix.install_cmd }}

    # Cache the benchmark JSON data files separately so network failures
    # on simdjson-data do not silently produce empty general-section results.
    - name: Cache benchmark data files
      uses: actions/cache@v5
      with:
        path: bench_data
        key: bench-data-v1

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: bench-${{ runner.os }}-${{ runner.arch }}-${{ matrix.cc }}
        max-size: 128M

    # Pre-download benchmark JSON files into a cached directory so CMake
    # configure does not need network access (avoids rate-limit / timeout failures).
    - name: Download benchmark data files
      run: |
        mkdir -p bench_data
        for file in twitter.json canada.json citm_catalog.json gsoc-2018.json; do
          if [ ! -f "bench_data/${file}" ]; then
            echo "Downloading ${file}..."
            curl -fsSL \
              "https://raw.githubusercontent.com/simdjson/simdjson-data/master/jsonexamples/${file}" \
              -o "bench_data/${file}" || echo "Warning: failed to download ${file}"
          else
            echo "Using cached ${file}"
          fi
        done

    # Set up Python BEFORE CMake configure so nanobind is built against the correct interpreter.
    # Without this, nanobind gets compiled for the system Python (wrong ABI) and import fails.
    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install orjson nanobind scikit-build-core

    - name: Clean build directory
      run: rm -rf build_bench

    - name: Configure CMake
      env:
        CC: ${{ matrix.cc }}
        CXX: ${{ matrix.cxx }}
      run: >
        cmake -B build_bench
        -DCMAKE_BUILD_TYPE=Release
        -DQBUEM_JSON_BUILD_TESTS=OFF
        -DQBUEM_JSON_BUILD_BENCHMARKS=ON
        -DQBUEM_JSON_BUILD_BINDINGS=ON
        -DQBUEM_DISABLE_LTO=ON
        -DCMAKE_C_COMPILER_LAUNCHER=ccache
        -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
        -DBENCHMARK_DATA_PREDOWNLOAD_DIR="${{ github.workspace }}/bench_data"

    - name: Build
      run: cmake --build build_bench --config Release -j2

    # Copy pre-downloaded JSON files into the build directory so bench can find them.
    # bench uses system() to re-invoke itself per library for the general section,
    # so the working directory must contain both the binary and JSON data files.
    - name: Copy data files into build directory
      if: always()
      run: |
        cp bench_data/*.json build_bench/benchmarks/ 2>/dev/null || true

    - name: Run benchmarks
      if: always()
      working-directory: build_bench/benchmarks
      # Use "|| true" so a crash or non-zero exit does NOT skip the parse/upload
      # steps. bench_output.txt is always created by tee; we process whatever we got.
      run: |
        if [ ! -f ./bench ]; then
          echo "ERROR: bench binary not found — build step may have failed" | tee bench_output.txt
          exit 0
        fi
        ./bench --quick --all 2>&1 | tee bench_output.txt || true

    - name: Setup Go for benchmarks
      uses: actions/setup-go@v6
      with:
        go-version: '1.24'
        cache: false

    - name: Run Go benchmarks
      working-directory: bindings/go
      run: |
        echo "##section bindings" >> ../../build_bench/benchmarks/bench_output.txt
        echo "=== Go Bindings ===" >> ../../build_bench/benchmarks/bench_output.txt
        # Set paths for linking and runtime
        export CGO_CFLAGS="-I$(pwd)/../c"
        export CGO_LDFLAGS="-L$(pwd)/../../build_bench/bindings/c -lqbuem_json_c"
        export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:$(pwd)/../../build_bench/bindings/c
        export DYLD_LIBRARY_PATH=$DYLD_LIBRARY_PATH:$(pwd)/../../build_bench/bindings/c
        go test -bench=. -benchmem . | \
        awk '
          /BenchmarkQbuemJSON/ { p=$3 }
          /BenchmarkQbuemDump/ { s=$3 }
          /BenchmarkStandardJSON/ { sp=$3 }
          /BenchmarkStandardMarshal/ { ss=$3 }
          END {
            if (p>0) printf "qbuem-json (Go) | Parse: %.2f us | Serialize: %.2f us | Alloc: 0 KB\n", p/1000, s/1000;
            if (sp>0) printf "encoding/json (Go) | Parse: %.2f us | Serialize: %.2f us | Alloc: 0 KB\n", sp/1000, ss/1000;
          }' \
        >> ../../build_bench/benchmarks/bench_output.txt || true

    - name: Run Rust benchmarks
      working-directory: bindings/rust
      run: |
        echo "##section bindings" >> ../../build_bench/benchmarks/bench_output.txt
        echo "=== Rust Bindings ===" >> ../../build_bench/benchmarks/bench_output.txt
        export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:$(pwd)/../../build_bench/bindings/c
        export DYLD_LIBRARY_PATH=$DYLD_LIBRARY_PATH:$(pwd)/../../build_bench/bindings/c
        cargo bench --bench qbuem_bench 2>&1 > /tmp/rust_bench_raw.txt || true
        python3 << 'PYEOF'
        import re, sys
        text = open("/tmp/rust_bench_raw.txt").read()
        # Criterion 0.5 two-line format: bench name on one line, time: [...] on next.
        # Mean is the SECOND value in the [lo mean hi] triplet.
        TIME_RE = re.compile(r'time:\s+\[\s*[\d.]+\s+\S+\s+([\d.]+)\s+(\S+)')
        def to_us(v, u):
            v = float(v)
            u = u.lower().rstrip(']').replace('\u03bc', 'u')
            if 'ns' in u: return v / 1000.0
            if 'ms' in u: return v * 1000.0
            return v
        parse_times, ser_times, cur_name, cur_group = {}, {}, None, None
        for line in text.splitlines():
            m = re.search(r'\b(Parsing|Serialization)/(\S+)', line)
            if m:
                cur_group = m.group(1)
                cur_name = 'serde_json (Rust)' if 'serde' in m.group(2) else 'qbuem-json (Rust)'
                # Do NOT continue: Criterion may put name and time: on the same line
            if cur_name is None:
                continue
            m2 = TIME_RE.search(line)
            if m2:
                us = to_us(m2.group(1), m2.group(2))
                if cur_group == 'Parsing': parse_times[cur_name] = us
                elif cur_group == 'Serialization': ser_times[cur_name] = us
                cur_name = None
        out_path = "../../build_bench/benchmarks/bench_output.txt"
        with open(out_path, "a") as f:
            for lib in sorted(set(list(parse_times) + list(ser_times))):
                p = parse_times.get(lib, 0.0)
                s = ser_times.get(lib, 0.0)
                f.write(f"{lib} | Parse: {p:.2f} us | Serialize: {s:.2f} us | Alloc: 0 KB\n")
        PYEOF

    - name: Run Python benchmarks
      run: |
        export PYTHONPATH=$(pwd)/bindings/python:$(pwd)/build_bench/bindings/python
        export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:$(pwd)/build_bench/bindings/c
        export DYLD_LIBRARY_PATH=$DYLD_LIBRARY_PATH:$(pwd)/build_bench/bindings/c
        # Show which .so files were built (helps debug ABI/path issues)
        echo "=== nanobind .so files in build ==="
        find build_bench/bindings/python -name "*.so" -o -name "*.pyd" 2>/dev/null || echo "(none found)"
        echo "=== Python import check ==="
        python3 -c "import qbuem_json_native; print('nanobind OK:', qbuem_json_native.__file__)" 2>&1 || echo "nanobind import FAILED"
        python3 bindings/python/bench/bench.py 2>&1 | tee -a build_bench/benchmarks/bench_output.txt || true

    # Run even if the benchmark step failed/crashed — we still upload partial results.
    - name: Parse results into JSON artifact
      if: always()
      run: |
        python3 << 'PYEOF'
        import re, json, os

        import pathlib
        p = pathlib.Path("build_bench/benchmarks/bench_output.txt")
        if not p.exists():
            print("bench_output.txt not found — bench binary likely missing (build failed)")
            text = ""
        else:
            text = p.read_text(encoding="utf-8")
        if not text.strip():
            print("bench_output.txt is empty — bench did not produce output")
        else:
            lines = text.splitlines()
            result_lines = [l for l in lines if "| Parse:" in l]
            print(f"bench_output.txt: {len(lines)} lines, {len(result_lines)} result lines")
            if not result_lines:
                print("WARNING: No result lines found. First 20 lines of output:")
                for l in lines[:20]:
                    print("  " + repr(l))

        # Output format:
        #   ##section general          ← section switch marker
        #   ##section structs
        #   === bench_all — <file> === ← item header (general section)
        #   === Struct: <name> ===     ← item header (structs section)
        #   <lib> | Parse: N.N µs | Serialize: N.N µs | Alloc: N KB
        # Capture sections and headers robustly
        SECTION_RE = re.compile(r'^##section\s+(\w+)')
        HEADER_RE  = re.compile(r'^===\s*(.*?)\s*===')

        general = []
        structs = []
        bindings = []
        current_section = "general"
        current_item    = None
        current_results = []

        def flush():
            global current_item, current_results, bindings
            if current_item is not None:
                # Basic normalization of the item name
                name = current_item
                for prefix in ["bench_all \u2014 ", "Struct: ", "HFT: "]:
                    if name.startswith(prefix):
                        name = name[len(prefix):]
                
                # Categorization: Keep items distinct by language
                if current_section == "bindings":
                    bindings.append({"file": name, "results": current_results})
                else:
                    entry = {"file": name, "results": current_results}
                    print(f"Flushing [{current_section}] -> {name} ({len(current_results)} results)")
                    if current_section == "general":
                        general.append(entry)
                    elif current_section == "structs":
                        structs.append(entry)

            current_item    = None
            current_results = []

        for line in text.splitlines():
            line = line.strip()
            if not line: continue

            sm = SECTION_RE.match(line)
            if sm:
                flush()
                current_section = sm.group(1).lower()
                print(f"Switching to section: {current_section}")
                continue

            hm = HEADER_RE.match(line)
            if hm:
                flush()
                current_item = hm.group(1).strip()
                print(f"New item: {current_item}")
                continue

            if "| Parse:" not in line:
                continue
                
            parts = line.split("|")
            if len(parts) < 3:
                continue
            lib = parts[0].strip()
            if not lib:
                continue

            # regex for float numbers (handles .2f output)
            f_re = r'[-+]?\d*\.?\d+'
            parse_vals = re.findall(f_re, parts[1])
            ser_vals   = re.findall(f_re, parts[2])
            
            if not parse_vals or not ser_vals:
                continue

            alloc_kb = 0
            if len(parts) >= 4:
                alloc_vals = re.findall(r'\d+', parts[3])
                if alloc_vals:
                    alloc_kb = int(alloc_vals[0])

            current_results.append({
                "library":      lib,
                "parse_us":     float(parse_vals[0]),
                "serialize_us": float(ser_vals[0]),
                "alloc_kb":     alloc_kb,
            })

        flush()

        data = {
            "arch":    "${{ matrix.arch }}",
            "label":   "${{ matrix.label }}",
            "general": general,
            "structs": structs,
            "bindings": bindings,
        }
        os.makedirs("bench_artifacts", exist_ok=True)
        out = "bench_artifacts/results-${{ matrix.arch }}.json"
        with open(out, "w", encoding="utf-8") as f:
            json.dump(data, f, indent=2)
        print(f"Wrote {len(general)} general + {len(structs)} struct + {len(bindings)} binding entries to {out}")
        PYEOF

    # Upload even when benchmark step failed so aggregate always gets data.
    - name: Upload results artifact
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: bench-results-${{ matrix.arch }}
        path: bench_artifacts/results-${{ matrix.arch }}.json
        retention-days: 7

  # ── Aggregate all platforms → step summary + Pages JSON ──────────────────
  aggregate:
    name: Aggregate and publish
    runs-on: ubuntu-latest
    # Run even if some benchmark jobs failed so we get partial results
    if: ${{ !cancelled() }}
    needs: benchmark
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Download all per-platform results
      uses: actions/download-artifact@v8
      with:
        pattern: bench-results-*
        path: bench_artifacts
        merge-multiple: true

    - name: Build step summary and docs JSON
      run: |
        python3 << 'PYEOF'
        import json, os, datetime, glob

        files = sorted(glob.glob("bench_artifacts/results-*.json"))
        platforms = []
        for f in files:
            with open(f, encoding="utf-8") as fp:
                platforms.append(json.load(fp))

        # Canonical display order
        ORDER = {"x86_64": 0, "apple-aarch64": 1, "linux-aarch64": 2}
        platforms.sort(key=lambda p: ORDER.get(p.get("arch", ""), 99))

        sha = os.environ.get("GITHUB_SHA", "")[:8]
        ref = os.environ.get("GITHUB_REF_NAME", "")

        # ── Step summary ───────────────────────────────────────────────────
        def make_table(section_items, section_title):
            out = []
            if not section_items:
                out.append(f"_No {section_title} data._\n")
                return out
            for fd in section_items:
                results = fd.get("results", [])
                out.append(f"#### `{fd['file']}`\n")
                if not results:
                    out.append("_No data._\n"); continue
                min_p = min(r["parse_us"] for r in results)
                min_s = min((r["serialize_us"] for r in results if r["serialize_us"] > 0), default=float("inf"))
                out.append("| Library | Parse (μs) | Serialize (μs) | Alloc (KB) |")
                out.append("|:--------|----------:|---------------:|-----------:|")
                for r in results:
                    pv, sv = r["parse_us"], r["serialize_us"]
                    mk = r.get("alloc_kb", 0)
                    pb = "**" if pv == min_p else ""
                    sb = "**" if sv > 0 and sv == min_s else ""
                    s_str = f"{sv:.2f}" if sv > 0 else "—"
                    m_str = str(mk) if mk > 0 else "—"
                    out.append(f"| {pb}{r['library']}{pb} | {pb}{pv:.2f}{pb} | {sb}{s_str}{sb} | {m_str} |")
                out.append("")
            return out

        lines = [
            f"## Benchmark · commit `{sha}` on `{ref}`",
            "",
            "> Quick mode · Release build · no PGO/LTO",
            "",
        ]
        for p in platforms:
            label = p.get("label", p.get("arch", "?"))
            lines.append(f"### {label}")
            lines.append("")
            lines.append("#### 📄 General JSON (DOM parse+serialize)")
            lines.extend(make_table(p.get("general", []), "general"))
            lines.append("#### 🧱 Struct Binding (C++ structs ↔ JSON)")
            lines.extend(make_table(p.get("structs", []), "structs"))
            lines.append("#### 🔗 Language Binding Benchmarks (Python/Go/Rust)")
            lines.extend(make_table(p.get("bindings", []), "bindings"))

        summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null")
        with open(summary_path, "a", encoding="utf-8") as f:
            f.write("\n".join(lines) + "\n")

        # ── JSON for Pages ─────────────────────────────────────────────────
        data = {
            "timestamp": datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ"),
            "commit": sha,
            "platforms": platforms,
        }
        os.makedirs("docs/public", exist_ok=True)
        with open("docs/public/benchmark-results.json", "w", encoding="utf-8") as f:
            json.dump(data, f, indent=2)

        print(f"Aggregated {len(platforms)} platform(s).")
        PYEOF
      env:
        GITHUB_SHA: ${{ github.sha }}
        GITHUB_REF_NAME: ${{ github.ref_name }}

    - name: Commit benchmark results to main
      run: |
        git config user.name  "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add docs/public/benchmark-results.json
        if git diff --cached --quiet; then
          echo "Benchmark results unchanged — nothing to commit."
        else
          git commit -m "chore: update CI benchmark results"
          git pull --rebase origin main
          git push origin HEAD:main
        fi
