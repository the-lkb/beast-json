name: Benchmark

on:
  push:
    branches: [main]
    paths:
      - 'include/**'
      - 'benchmarks/**'
      - '.github/workflows/benchmark.yml'
  workflow_dispatch:

jobs:
  # ── Per-platform benchmark ────────────────────────────────────────────────
  benchmark:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            label: "x86_64 · GCC 13 · Ubuntu"
            cc: gcc-13
            cxx: g++-13
            install_cmd: sudo apt-get update -qq && sudo apt-get install -y g++-13

          - os: ubuntu-24.04-arm
            arch: linux-aarch64
            label: "Linux aarch64 · GCC 14 · Ubuntu"
            cc: gcc-14
            cxx: g++-14
            install_cmd: sudo apt-get update -qq && sudo apt-get install -y g++-14

          - os: macos-latest
            arch: apple-aarch64
            label: "Apple Silicon · Apple Clang · macOS"
            cc: clang
            cxx: clang++
            install_cmd: echo "Apple Clang pre-installed"

    steps:
    - uses: actions/checkout@v4

    - name: Install compiler
      run: ${{ matrix.install_cmd }}

    - name: Cache FetchContent dependencies
      uses: actions/cache@v4
      with:
        path: build_bench/_deps
        key: bench-deps-${{ runner.os }}-${{ runner.arch }}-${{ matrix.cc }}-${{ hashFiles('benchmarks/CMakeLists.txt') }}
        restore-keys: bench-deps-${{ runner.os }}-${{ runner.arch }}-${{ matrix.cc }}-

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: bench-${{ runner.os }}-${{ runner.arch }}-${{ matrix.cc }}
        max-size: 128M

    - name: Configure CMake
      env:
        CC: ${{ matrix.cc }}
        CXX: ${{ matrix.cxx }}
      run: >
        cmake -B build_bench
        -DCMAKE_BUILD_TYPE=Release
        -DQBUEM_JSON_BUILD_TESTS=OFF
        -DQBUEM_JSON_BUILD_BENCHMARKS=ON
        -DCMAKE_C_COMPILER_LAUNCHER=ccache
        -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

    - name: Build
      run: cmake --build build_bench --config Release -j2

    # bench uses system() to re-invoke itself per library for the general section,
    # so the working directory must contain both the binary and JSON data files.
    - name: Run benchmarks
      working-directory: build_bench/benchmarks
      run: |
        ./bench --quick --all 2>&1 | tee bench_output.txt

    - name: Parse results into JSON artifact
      run: |
        python3 << 'PYEOF'
        import re, json, os

        with open("build_bench/benchmarks/bench_output.txt", encoding="utf-8") as f:
            text = f.read()

        # Output format:
        #   ##section general          ← section switch marker
        #   ##section structs
        #   === bench_all — <file> === ← item header (general section)
        #   === Struct: <name> ===     ← item header (structs section)
        #   <lib> | Parse: N.N µs | Serialize: N.N µs | Alloc: N KB
        SECTION_RE = re.compile(r'^##section\s+(\w+)')
        HEADER_RE  = re.compile(r'^=== (?:bench_all \u2014 |Struct: |HFT: )(.+?) ===')

        general = []
        structs = []
        current_section = "general"
        current_item    = None
        current_results = []

        def flush():
            global current_item, current_results
            if current_item is not None:
                entry = {"file": current_item, "results": current_results}
                if current_section == "general":
                    general.append(entry)
                else:
                    structs.append(entry)
            current_item    = None
            current_results = []

        for line in text.splitlines():
            sm = SECTION_RE.match(line)
            if sm:
                flush()
                current_section = sm.group(1)
                continue

            hm = HEADER_RE.match(line)
            if hm:
                flush()
                current_item    = hm.group(1)
                current_results = []
                continue

            if "| Parse:" not in line:
                continue
            parts = line.split("|")
            if len(parts) < 3:
                continue
            lib = parts[0].strip()
            if not lib:
                continue
            parse_vals = re.findall(r'[\d]+\.[\d]+', parts[1])
            ser_vals   = re.findall(r'[\d]+\.[\d]+', parts[2])
            if not parse_vals or not ser_vals:
                continue
            alloc_kb = 0
            if len(parts) >= 4:
                alloc_vals = re.findall(r'\d+', parts[3])
                if alloc_vals:
                    alloc_kb = int(alloc_vals[0])
            current_results.append({
                "library":      lib,
                "parse_us":     float(parse_vals[0]),
                "serialize_us": float(ser_vals[0]),
                "alloc_kb":     alloc_kb,
            })

        flush()

        data = {
            "arch":    "${{ matrix.arch }}",
            "label":   "${{ matrix.label }}",
            "general": general,
            "structs": structs,
        }
        os.makedirs("bench_artifacts", exist_ok=True)
        out = "bench_artifacts/results-${{ matrix.arch }}.json"
        with open(out, "w", encoding="utf-8") as f:
            json.dump(data, f, indent=2)
        print(f"Wrote {len(general)} general + {len(structs)} struct entries to {out}")
        PYEOF

    - name: Upload results artifact
      uses: actions/upload-artifact@v4
      with:
        name: bench-results-${{ matrix.arch }}
        path: bench_artifacts/results-${{ matrix.arch }}.json
        retention-days: 7

  # ── Aggregate all platforms → step summary + Pages JSON ──────────────────
  aggregate:
    name: Aggregate and publish
    runs-on: ubuntu-latest
    # Run even if some benchmark jobs failed so we get partial results
    if: ${{ !cancelled() }}
    needs: benchmark
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download all per-platform results
      uses: actions/download-artifact@v4
      with:
        pattern: bench-results-*
        path: bench_artifacts
        merge-multiple: true

    - name: Build step summary and docs JSON
      run: |
        python3 << 'PYEOF'
        import json, os, datetime, glob

        files = sorted(glob.glob("bench_artifacts/results-*.json"))
        platforms = []
        for f in files:
            with open(f, encoding="utf-8") as fp:
                platforms.append(json.load(fp))

        # Canonical display order
        ORDER = {"x86_64": 0, "apple-aarch64": 1, "linux-aarch64": 2}
        platforms.sort(key=lambda p: ORDER.get(p.get("arch", ""), 99))

        sha = os.environ.get("GITHUB_SHA", "")[:8]
        ref = os.environ.get("GITHUB_REF_NAME", "")

        # ── Step summary ───────────────────────────────────────────────────
        def make_table(section_items, section_title):
            out = []
            if not section_items:
                out.append(f"_No {section_title} data._\n")
                return out
            for fd in section_items:
                results = fd.get("results", [])
                out.append(f"#### `{fd['file']}`\n")
                if not results:
                    out.append("_No data._\n"); continue
                min_p = min(r["parse_us"] for r in results)
                min_s = min((r["serialize_us"] for r in results if r["serialize_us"] > 0), default=float("inf"))
                out.append("| Library | Parse (μs) | Serialize (μs) | Alloc (KB) |")
                out.append("|:--------|----------:|---------------:|-----------:|")
                for r in results:
                    pv, sv = r["parse_us"], r["serialize_us"]
                    mk = r.get("alloc_kb", 0)
                    pb = "**" if pv == min_p else ""
                    sb = "**" if sv > 0 and sv == min_s else ""
                    s_str = f"{sv:.2f}" if sv > 0 else "—"
                    m_str = str(mk) if mk > 0 else "—"
                    out.append(f"| {pb}{r['library']}{pb} | {pb}{pv:.2f}{pb} | {sb}{s_str}{sb} | {m_str} |")
                out.append("")
            return out

        lines = [
            f"## Benchmark · commit `{sha}` on `{ref}`",
            "",
            "> Quick mode · Release build · no PGO/LTO",
            "",
        ]
        for p in platforms:
            label = p.get("label", p.get("arch", "?"))
            lines.append(f"### {label}")
            lines.append("")
            lines.append("#### 📄 General JSON (DOM parse+serialize)")
            lines.extend(make_table(p.get("general", []), "general"))
            lines.append("#### 🧱 Struct Binding (C++ structs ↔ JSON)")
            lines.extend(make_table(p.get("structs", []), "structs"))

        summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null")
        with open(summary_path, "a", encoding="utf-8") as f:
            f.write("\n".join(lines) + "\n")

        # ── JSON for Pages ─────────────────────────────────────────────────
        data = {
            "timestamp": datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ"),
            "commit": sha,
            "platforms": platforms,
        }
        os.makedirs("docs/public", exist_ok=True)
        with open("docs/public/benchmark-results.json", "w", encoding="utf-8") as f:
            json.dump(data, f, indent=2)

        print(f"Aggregated {len(platforms)} platform(s).")
        PYEOF
      env:
        GITHUB_SHA: ${{ github.sha }}
        GITHUB_REF_NAME: ${{ github.ref_name }}

    - name: Commit benchmark results to main
      run: |
        git config user.name  "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add docs/public/benchmark-results.json
        if git diff --cached --quiet; then
          echo "Benchmark results unchanged — nothing to commit."
        else
          git commit -m "chore: update CI benchmark results"
          git pull --rebase origin main
          git push origin HEAD:main
        fi
